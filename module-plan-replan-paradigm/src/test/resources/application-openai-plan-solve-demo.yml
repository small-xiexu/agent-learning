spring:
  config:
    import:
      - optional:application-llm-local.yml
      - optional:application-openai-plan-solve-demo-local.yml

llm:
  provider: openai-compatible
  base-url: https://api.openai.com
  api-key:
  model: gpt-4o
  chat-completions-path: /v1/chat/completions

demo:
  plan-solve:
    openai:
      enabled: false
